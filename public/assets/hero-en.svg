<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 640" width="1600" height="640" role="img" aria-label="Transvela — put a password on any link">
  <!-- background : warm paper, never pure white -->
  <g id="background">
    <rect x="0" y="0" width="1600" height="640" fill="#fdf9f2"/>
  </g>

  <!-- headline : eyebrow badge + heavy title + muted subline, in the left column -->
  <g id="headline" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', 'Microsoft YaHei', sans-serif">
    <g transform="rotate(-3 205 202)">
      <rect x="118" y="192" width="182" height="40" rx="20" fill="#ff6b47"/>
      <rect x="112" y="186" width="182" height="40" rx="20" fill="#ffe4da" stroke="#241c15" stroke-width="2"/>
      <text x="203" y="213" text-anchor="middle" font-size="19" font-weight="700" fill="#241c15">TRANSVELA</text>
    </g>
    <text x="112" y="323" font-size="64" font-weight="800" fill="#241c15">Put a <tspan fill="#ff6b47">password</tspan></text>
    <text x="112" y="403" font-size="64" font-weight="800" fill="#241c15">on any link.</text>
    <text x="112" y="462" font-size="23" font-weight="400" fill="#8a7f70">Encrypted in your browser — the server only ever sees ciphertext.</text>
  </g>

  <!-- chain : dashed connector through the pill centers, with dot nodes -->
  <g id="chain" fill="none">
    <path d="M 665 565 C 790 535, 880 465, 980 420 C 1060 380, 1090 345, 1170 300 C 1250 255, 1280 225, 1360 185 C 1430 150, 1450 125, 1520 80"
          stroke="#241c15" stroke-width="3" stroke-dasharray="10 10" stroke-linecap="round"/>
    <circle cx="870" cy="468" r="7" fill="#ff6b47" stroke="#241c15" stroke-width="2"/>
    <circle cx="1263" cy="243" r="7" fill="#ff6b47" stroke="#241c15" stroke-width="2"/>
    <circle cx="1443" cy="128" r="7" fill="#ff6b47" stroke="#241c15" stroke-width="2"/>
  </g>

  <!-- pills : four plain white capsules, hard coral offset shadow, 2px ink outline -->
  <g id="pills">
    <rect x="688" y="498" width="160" height="60" rx="30" fill="#ff6b47"/>
    <rect x="680" y="490" width="160" height="60" rx="30" fill="#ffffff" stroke="#241c15" stroke-width="2"/>

    <rect x="908" y="398" width="160" height="60" rx="30" fill="#ff6b47"/>
    <rect x="900" y="390" width="160" height="60" rx="30" fill="#ffffff" stroke="#241c15" stroke-width="2"/>

    <rect x="1288" y="163" width="160" height="60" rx="30" fill="#ff6b47"/>
    <rect x="1280" y="155" width="160" height="60" rx="30" fill="#ffffff" stroke="#241c15" stroke-width="2"/>

    <rect x="1428" y="73" width="160" height="60" rx="30" fill="#ff6b47"/>
    <rect x="1420" y="65" width="160" height="60" rx="30" fill="#ffffff" stroke="#241c15" stroke-width="2"/>
  </g>

  <!-- locked-pill : the hero capsule, coral fill, white padlock, radiating strokes -->
  <g id="locked-pill">
    <rect x="1073" y="266" width="210" height="84" rx="42" fill="#241c15"/>
    <rect x="1065" y="258" width="210" height="84" rx="42" fill="#ff6b47" stroke="#241c15" stroke-width="2"/>

    <!-- padlock: shackle + body + coral keyhole -->
    <path d="M 1156 290 v -12 a 14 14 0 0 1 28 0 v 12" fill="none" stroke="#241c15" stroke-width="5" stroke-linecap="round"/>
    <rect x="1146" y="290" width="48" height="38" rx="9" fill="#ffffff" stroke="#241c15" stroke-width="3"/>
    <circle cx="1170" cy="305" r="5" fill="#ff6b47" stroke="#241c15" stroke-width="2"/>
    <line x1="1170" y1="310" x2="1170" y2="319" stroke="#241c15" stroke-width="3" stroke-linecap="round"/>

    <!-- radiating "locked!" strokes -->
    <g stroke="#241c15" stroke-width="4" stroke-linecap="round">
      <line x1="1052" y1="242" x2="1034" y2="226"/>
      <line x1="1170" y1="228" x2="1170" y2="204"/>
      <line x1="1290" y1="244" x2="1309" y2="228"/>
      <line x1="1308" y1="318" x2="1329" y2="330"/>
    </g>
  </g>

  <!-- badges : small rotated sticker tags, abstract shapes only (no text) -->
  <g id="badges">
    <!-- top-right sticker, soft coral -->
    <g transform="rotate(-6 1325 54)">
      <rect x="1278" y="40" width="110" height="44" rx="14" fill="#ff6b47"/>
      <rect x="1270" y="32" width="110" height="44" rx="14" fill="#ffe4da" stroke="#241c15" stroke-width="2"/>
      <circle cx="1296" cy="54" r="8" fill="#ff6b47" stroke="#241c15" stroke-width="2"/>
      <rect x="1314" y="45" width="46" height="5" rx="2.5" fill="#241c15"/>
      <rect x="1314" y="58" width="32" height="5" rx="2.5" fill="#241c15"/>
    </g>
    <!-- bottom-left sticker, white -->
    <g transform="rotate(8 135 555)">
      <rect x="78" y="538" width="130" height="50" rx="14" fill="#ff6b47"/>
      <rect x="70" y="530" width="130" height="50" rx="14" fill="#ffffff" stroke="#241c15" stroke-width="2"/>
      <circle cx="98" cy="555" r="8" fill="#ffe4da" stroke="#241c15" stroke-width="2"/>
      <rect x="118" y="546" width="56" height="5" rx="2.5" fill="#241c15"/>
      <rect x="118" y="559" width="38" height="5" rx="2.5" fill="#241c15"/>
    </g>
  </g>
</svg>
