<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Transvela</title>
<link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand-lockup" href="/" aria-label="Transvela home">
      <div class="brand">Transvela</div>
      <div class="tagline" data-i18n="brand.tagline"></div>
    </a>
    <button class="lang-toggle" id="langToggle" data-i18n-toggle></button>
  </header>

  <main class="verify-layout">
  <section class="card verify-card" id="loadingCard">
    <div class="dot-loader" aria-hidden="true"><span></span><span></span><span></span></div>
    <p class="card-intro loading-text" data-i18n="verify.loading"></p>
  </section>

  <section class="card verify-card hidden" id="verifyCard">
    <span class="card-tag" data-i18n="verify.eyebrow"></span>
    <h1 data-i18n="verify.title"></h1>
    <p class="card-intro" data-i18n="verify.subtitle"></p>

    <div class="hint-box hidden" id="hintBox">
      <span data-i18n="verify.hintPrefix"></span><span id="hintText"></span>
    </div>

    <form id="verifyForm">
      <label for="passwordInput" data-i18n="verify.passwordLabel"></label>
      <div class="password-field">
        <input type="password" id="passwordInput" data-i18n-placeholder="verify.passwordPlaceholder" required autofocus autocomplete="current-password" />
        <button type="button" class="password-toggle" id="passwordToggle" data-i18n-aria="create.showPassword" aria-label="Show password">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none" aria-hidden="true"><path d="M1.5 10S4.5 4 10 4s8.5 6 8.5 6-3 6-8.5 6-8.5-6-8.5-6Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><circle cx="10" cy="10" r="2.4" stroke="currentColor" stroke-width="1.4"/><line class="eye-slash" x1="2.5" y1="2.5" x2="17.5" y2="17.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="error-text" id="verifyError"></div>

      <button type="submit" class="primary" id="verifySubmitBtn" data-i18n="verify.submitBtn"></button>
    </form>
    <div class="status-text hidden" id="statusText"></div>
  </section>

  <section class="card verify-card hidden" id="notFoundCard">
    <h1 data-i18n="notFound.title"></h1>
    <p data-i18n="notFound.message"></p>
    <a class="primary" href="/" data-i18n="notFound.backLink"></a>
  </section>

  <section class="card verify-card hidden" id="networkErrorCard">
    <h1 data-i18n="verify.networkErrorTitle"></h1>
    <p data-i18n="verify.networkError"></p>
    <button type="button" class="primary" id="retryBtn" data-i18n="verify.retryBtn"></button>
  </section>
  </main>

  <script src="/assets/js/i18n.js"></script>
  <script src="/assets/js/crypto.js"></script>
  <script src="/assets/js/verify.js"></script>
</body>
</html>
